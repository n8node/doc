# Пример для СИСТЕМНОГО nginx на Ubuntu, когда :80/:443 обслуживает не контейнер из compose,
# а /etc/nginx/sites-enabled/*. Контейнер onlyoffice слушает на 127.0.0.1:8088 (см. docker-compose).
#
# Установка:
# 1) docker compose up -d onlyoffice
# 2) Проверка: curl -sI http://127.0.0.1:8088/web-apps/apps/api/documents/api.js → 200
# 3) Блоки map — один раз внутри http { } в /etc/nginx/nginx.conf (или отдельный файл + include)
# 4) Блоки location — в КАЖДЫЙ server { } для qoqon.ru (и для 80, и для 443), ПЕРЕД location /
# 5) nginx -t && systemctl reload nginx
#
# ONLYOFFICE_DOCUMENT_SERVER_URL в .env приложения: https://qoqon.ru/onlyoffice

# ========== Вставить в http { } один раз ==========
map $http_upgrade $oo_connection {
    default upgrade;
    ""      close;
}
map $http_x_forwarded_proto $oo_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}
map $http_x_forwarded_host $oo_forwarded_host {
    default $http_x_forwarded_host;
    ""      $host;
}

# ========== Вставить в server { } для qoqon.ru ==========
location = /onlyoffice {
    return 301 /onlyoffice/;
}

location /onlyoffice/ {
    proxy_pass http://127.0.0.1:8088/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $oo_connection;
    proxy_set_header X-Forwarded-Host $oo_forwarded_host/onlyoffice;
    proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    client_max_body_size 100M;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
}
