# Пример для СИСТЕМНОГО nginx на Ubuntu, когда :80/:443 обслуживает не контейнер из compose,
# а /etc/nginx/sites-enabled/*. Контейнер onlyoffice слушает на 127.0.0.1:8088 (см. docker-compose).
#
# Установка:
# 1) docker compose up -d onlyoffice
# 2) Проверка: curl -sI http://127.0.0.1:8088/web-apps/apps/api/documents/api.js → 200
# 3) Блоки map — один раз внутри http { } в /etc/nginx/nginx.conf (или отдельный файл + include)
# 4) Блоки location — в КАЖДЫЙ server { } для qoqon.ru (и для 80, и для 443), ПЕРЕД location /
# 5) nginx -t && systemctl reload nginx
#
# ONLYOFFICE_DOCUMENT_SERVER_URL в .env приложения: https://qoqon.ru/onlyoffice
#
# Длинный query (?token= stateless JWT для скачивания в DS) может требовать буферов у nginx.
# Старый короткий ?t= по-прежнему принимается API; при 414/400 на document — поднять буферы.
# На всякий случай для /api (если проксируете Next на этот же server):
#   large_client_header_buffers 4 32k;

# ========== Вставить в http { } один раз ==========
map $http_upgrade $oo_connection {
    default upgrade;
    ""      close;
}
map $http_x_forwarded_proto $oo_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}
map $http_x_forwarded_host $oo_forwarded_host {
    default $http_x_forwarded_host;
    ""      $host;
}

# ========== Вставить в server { } для qoqon.ru ==========
location = /onlyoffice {
    return 301 /onlyoffice/;
}

location /onlyoffice/ {
    proxy_pass http://127.0.0.1:8088/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $oo_connection;
    proxy_set_header X-Forwarded-Host $oo_forwarded_host/onlyoffice;
    proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    client_max_body_size 100M;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
}

# Редактор запрашивает с корня домена (не только /onlyoffice/). Без этого /coauthoring (WebSocket) уходит в Next и не работает.
location /coauthoring/ {
    proxy_pass http://127.0.0.1:8088/coauthoring/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $oo_connection;
    proxy_set_header X-Forwarded-Host $oo_forwarded_host;
    proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
}

location /web-apps/ {
    proxy_pass http://127.0.0.1:8088/web-apps/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $oo_connection;
    proxy_set_header X-Forwarded-Host $oo_forwarded_host;
    proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
}

location /cache/ {
    proxy_pass http://127.0.0.1:8088/cache/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $oo_forwarded_host;
    proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
    proxy_buffering off;
}

location /sdkjs-plugins/ {
    proxy_pass http://127.0.0.1:8088/sdkjs-plugins/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
}

location /sdkjs/ {
    proxy_pass http://127.0.0.1:8088/sdkjs/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
}

location /fonts/ {
    proxy_pass http://127.0.0.1:8088/fonts/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
}

location /dictionaries/ {
    proxy_pass http://127.0.0.1:8088/dictionaries/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
}

location /meta/ {
    proxy_pass http://127.0.0.1:8088/meta/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;
}

location = /document_editor_service_worker.js {
    proxy_pass http://127.0.0.1:8088/document_editor_service_worker.js;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
}
