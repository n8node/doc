# Reverse proxy для qoqon.ru
# Главная (/) и WordPress — в WordPress; кабинет, API, админка — в Next.js app

upstream app {
    server app:3000;
}

upstream adminer {
    server adminer:8080;
}

upstream wordpress {
    server wordpress:80;
}

server {
    listen 80;
    server_name qoqon.ru www.qoqon.ru localhost;
    client_max_body_size 100M;

    # Adminer
    location /adminer/ {
        proxy_pass http://adminer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js: долгий таймаут для vectorize
    location ~ ^/api/v1/rag/collections/[^/]+/vectorize$ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # Next.js: API и приложение (кабинет, логин, админка, документация и т.д.)
    location ~ ^/(api|dashboard|login|register|admin|docs|auth|forgot-password|invites|pages|terms|privacypolicy|refund|shop-terms)(/|$) {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Next.js: публичные ссылки расшаривания /s/TOKEN
    location /s/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress: админка, контент, API
    location ~ ^/wp-(admin|content|includes|json) {
        proxy_pass http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /xmlrpc.php {
        proxy_pass http://wordpress;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Главная и все остальные запросы — WordPress (лендинг, блог, страницы)
    location / {
        proxy_pass http://wordpress;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
