# Reverse proxy для qoqon.ru
upstream app {
    server app:3000;
}

upstream adminer {
    server adminer:8080;
}

upstream onlyoffice_upstream {
    server onlyoffice:80;
}

# ONLYOFFICE за виртуальным путём (см. document-server-proxy/nginx/proxy-to-virtual-path.conf)
map $http_upgrade $oo_connection {
    default upgrade;
    ""      close;
}

map $http_x_forwarded_proto $oo_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_x_forwarded_host $oo_forwarded_host {
    default $http_x_forwarded_host;
    ""      $host;
}

server {
    listen 80;
    server_name qoqon.ru www.qoqon.ru localhost;
    client_max_body_size 100M;

    location ~ ^/api/v1/rag/collections/[^/]+/vectorize$ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # ONLYOFFICE Document Server: публичный URL https://qoqon.ru/onlyoffice/
    location = /onlyoffice {
        return 301 /onlyoffice/;
    }

    location /onlyoffice/ {
        proxy_pass http://onlyoffice_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $oo_connection;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host/onlyoffice;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        client_max_body_size 100M;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ONLYOFFICE: пути с корня домена (iframe тянет /web-apps, /coauthoring, …).
    # Через Next/middleware WebSocket на внешний DS не поднимается — без nginx coauthoring «висит», скелет не сходит.
    location /coauthoring/ {
        proxy_pass http://onlyoffice_upstream/coauthoring/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $oo_connection;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /web-apps/ {
        proxy_pass http://onlyoffice_upstream/web-apps/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $oo_connection;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /cache/ {
        proxy_pass http://onlyoffice_upstream/cache/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    location /sdkjs-plugins/ {
        proxy_pass http://onlyoffice_upstream/sdkjs-plugins/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_buffering off;
    }

    location /sdkjs/ {
        proxy_pass http://onlyoffice_upstream/sdkjs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_buffering off;
    }

    location /fonts/ {
        proxy_pass http://onlyoffice_upstream/fonts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /dictionaries/ {
        proxy_pass http://onlyoffice_upstream/dictionaries/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /meta/ {
        proxy_pass http://onlyoffice_upstream/meta/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location = /document_editor_service_worker.js {
        proxy_pass http://onlyoffice_upstream/document_editor_service_worker.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /adminer/ {
        proxy_pass http://adminer/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
