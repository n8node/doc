# Reverse proxy для qoqon.ru
#
# Без resolver + переменных nginx резолвит app/onlyoffice при старте конфига →
# «host not found in upstream app» если DNS ещё не готов (Restarting loop).

resolver 127.0.0.11 valid=30s ipv6=off;
resolver_timeout 5s;

# ONLYOFFICE за виртуальным путём (см. document-server-proxy/nginx/proxy-to-virtual-path.conf)
map $http_upgrade $oo_connection {
    default upgrade;
    ""      close;
}

map $http_x_forwarded_proto $oo_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

map $http_x_forwarded_host $oo_forwarded_host {
    default $http_x_forwarded_host;
    ""      $host;
}

server {
    listen 80;
    server_name qoqon.ru www.qoqon.ru localhost;
    client_max_body_size 100M;

    location ~ ^/api/v1/rag/collections/[^/]+/vectorize$ {
        set $app_upstream http://app:3000;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # ONLYOFFICE Document Server: публичный URL https://qoqon.ru/onlyoffice/
    location = /onlyoffice {
        return 301 /onlyoffice/;
    }

    location /onlyoffice/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $oo_connection;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host/onlyoffice;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        client_max_body_size 100M;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ONLYOFFICE: пути с корня домена (iframe тянет /web-apps, /coauthoring, …).
    location /coauthoring/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/coauthoring/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $oo_connection;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /web-apps/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/web-apps/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $oo_connection;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /cache/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/cache/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }

    location /sdkjs-plugins/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/sdkjs-plugins/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_buffering off;
    }

    location /sdkjs/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/sdkjs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $oo_forwarded_host;
        proxy_set_header X-Forwarded-Proto $oo_forwarded_proto;
        proxy_buffering off;
    }

    location /fonts/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/fonts/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /dictionaries/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/dictionaries/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location /meta/ {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/meta/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    location = /document_editor_service_worker.js {
        set $oo_upstream http://onlyoffice:80;
        proxy_pass $oo_upstream/document_editor_service_worker.js;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        set $app_upstream http://app:3000;
        proxy_pass $app_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    location /adminer/ {
        set $adminer_upstream http://adminer:8080;
        proxy_pass $adminer_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
