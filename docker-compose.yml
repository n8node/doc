# Dropbox-подобный сервис для qoqon.ru
# PostgreSQL 16 с pgvector для AI-поиска

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dropbox_ru
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_preload_libraries=vector
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  n8n-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: n8n_db
      POSTGRES_USER: n8n_admin
      POSTGRES_PASSWORD: ${N8N_DB_PASSWORD:-n8n_change_me}
    ports:
      - "5433:5432"
    volumes:
      - n8n_db_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_preload_libraries=vector
      -c max_connections=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n_admin -d n8n_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      db: { condition: service_healthy }
      docling: { condition: service_healthy }
      onlyoffice: { condition: service_started }
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/dropbox_ru?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://qoqon.ru}
      APP_URL: ${APP_URL:-https://qoqon.ru}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      # Тот же ключ, что в .env на сервере; без него не расшифруются секреты из AdminConfig (VK, S3, …)
      CONFIG_ENCRYPTION_KEY: ${CONFIG_ENCRYPTION_KEY}
      REDIS_URL: redis://redis:6379
      DOCLING_URL: http://docling:8000
      ONLYOFFICE_JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice_dev_change_me}
      # Прод: https://<домен>/onlyoffice. Локально переопределите в .env или см. .env.development для npm run dev.
      ONLYOFFICE_DOCUMENT_SERVER_URL: ${ONLYOFFICE_DOCUMENT_SERVER_URL:-https://qoqon.ru/onlyoffice}
      # Прокси /onlyoffice/* → контейнер onlyoffice (next.config rewrites); переопределите при необходимости
      ONLYOFFICE_INTERNAL_ORIGIN: ${ONLYOFFICE_INTERNAL_ORIGIN:-http://onlyoffice}
      APP_INTERNAL_URL: http://app:3000
      # Пусто: в коде берётся https APP_URL — DS качает через системный nginx (как браузер).
      # Если hairpin/VPS режет выход на свой же https — в .env: ONLYOFFICE_DOCUMENT_DOWNLOAD_BASE_URL=http://app:3000
      ONLYOFFICE_DOCUMENT_DOWNLOAD_BASE_URL: ${ONLYOFFICE_DOCUMENT_DOWNLOAD_BASE_URL:-}
      N8N_DB_URL: ${N8N_DB_URL:-postgresql://n8n_admin:n8n_change_me@n8n-db:5432/n8n_db}
    deploy:
      resources:
        limits: { memory: 2G }
    restart: unless-stopped

  # Опционально: только если НЕТ системного nginx на 80/443 (иначе bind: address already in use).
  # Прод с qoqon.ru: трафик с хоста → app:3000 и onlyoffice:8088; этот сервис не нужен.
  # Запуск: docker compose --profile docker-nginx up -d
  nginx:
    profiles:
      - docker-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - onlyoffice
    restart: unless-stopped

  onlyoffice:
    image: onlyoffice/documentserver:latest
    environment:
      JWT_ENABLED: "true"
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET:-onlyoffice_dev_change_me}
      JWT_HEADER: Authorization
      # Иначе DS не качает файл по http://app:3000/... (приватная сеть Docker) — вечный скелет в редакторе.
      ALLOW_PRIVATE_IP_ADDRESS: "true"
    # Проброс на хост: системный nginx (Ubuntu) проксирует /onlyoffice/ → 127.0.0.1:8088
    ports:
      - "127.0.0.1:8088:80"
    deploy:
      resources:
        limits: { memory: 4G }
        reservations: { memory: 2G }
    restart: unless-stopped

  docling:
    build:
      context: ./docker/docling
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      MAX_FILE_SIZE_MB: ${DOCLING_MAX_FILE_SIZE_MB:-100}
    deploy:
      resources:
        limits: { memory: 8G }
        reservations: { memory: 4G }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  n8n_db_data:
