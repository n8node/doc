# Dropbox-подобный сервис для qoqon.ru
# PostgreSQL 16 с pgvector для AI-поиска

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: dropbox_ru
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/db-init:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
      -c shared_preload_libraries=vector
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      db: { condition: service_healthy }
      docling: { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/dropbox_ru?schema=public
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://qoqon.ru}
      APP_URL: ${APP_URL:-https://qoqon.ru}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      REDIS_URL: redis://redis:6379
      DOCLING_URL: http://docling:8000
    deploy:
      resources:
        limits: { memory: 1G }
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

  docling:
    build:
      context: ./docker/docling
      dockerfile: Dockerfile
    environment:
      MAX_FILE_SIZE_MB: ${DOCLING_MAX_FILE_SIZE_MB:-100}
    deploy:
      resources:
        limits: { memory: 4G }
        reservations: { memory: 2G }
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
